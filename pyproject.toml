[tool.poetry]
name = "tracepipe-ai"
version = "0.1.0"
description = "AI-powered data lineage tracking"
authors = ["Tracepipe AI Team"]

[tool.poetry.dependencies]
python = "^3.9"
databricks-sdk = "^0.20.0"
fastapi = "^0.109.0"
uvicorn = "^0.27.0"
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
sqlalchemy = "^2.0.25"
alembic = "^1.13.1"
psycopg2-binary = "^2.9.9"
pyarrow = "^15.0.0"
duckdb = "^0.10.0"

[tool.poetry.dev-dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
black = "^23.12.0"
flake8 = "^6.1.0"
mypy = "^1.8.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
