[tool.poetry]
name = "tracepipe-ai"
version = "0.1.0"
description = "AI-powered data lineage tracking"
authors = ["Anurag <anurag@tracepipe.ai>"]

[tool.poetry.dependencies]
python = "^3.9"
databricks-sdk = "^0.20.0"
pydantic = "^2.0.0"
pydantic-settings = "^2.0.0"
openai = "^1.0.0"
fastapi = "^0.104.0"
uvicorn = "^0.24.0"
sqlalchemy = "^2.0.0"
alembic = "^1.12.0"
pytz = "^2023.3"
duckdb = "^0.9.0"

[tool.poetry.dev-dependencies]
pytest = "^7.4.0"
pytest-asyncio = "^0.21.0"
pytest-cov = "^4.1.0"
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.5.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
