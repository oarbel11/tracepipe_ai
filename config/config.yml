databricks:
  server_hostname: "your-workspace.cloud.databricks.com"
  http_path: "/sql/1.0/warehouses/your-warehouse-id"
  access_token: "${DATABRICKS_TOKEN}"

lineage:
  default_catalog: "companies_data"
  lookback_days: 7
  max_queries: 1000

visualization:
  output_format: "html"
  include_users: true
  include_timestamps: true
