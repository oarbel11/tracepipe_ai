databricks:
  host: ${DATABRICKS_HOST}
  token: ${DATABRICKS_TOKEN}
  catalog: companies_data
  schema: corporate

lineage_connectors:
  - type: snowflake
    enabled: false
    host: account.snowflakecomputing.com
    database: analytics_db
    warehouse: compute_wh

  - type: tableau
    enabled: false
    server: tableau.company.com
    site: default

  - type: kafka
    enabled: false
    bootstrap_servers: kafka.company.com:9092
    schema_registry: http://schema-registry.company.com:8081

lineage_settings:
  auto_refresh_interval_hours: 24
  include_column_lineage: true
  max_depth: 10
  cache_enabled: true
