# ============================================
# Tracepipe AI - Database Configuration
# ============================================
# Set your database connection details here.
# Choose ONE database type and fill in the details.

# Database type: "duckdb" or "databricks"
db_type: "duckdb"

# ============================================
# Lineage Source Configuration
# ============================================
# Choose how lineage is tracked. Three main options:
#
# OPTION 1: "databricks" - Use Databricks Unity Catalog (RECOMMENDED)
#   Unity Catalog automatically tracks lineage from ALL queries:
#   - Interactive SQL queries in notebooks
#   - SQL Editor queries
#   - Spark jobs (scheduled or ad-hoc)
#   - CREATE TABLE AS SELECT statements
#   - Any INSERT/MERGE that ran at least once
#   NO local files or formal jobs needed!
#
# OPTION 2: "local" - Parse local SQL/Spark files
#   - Use when you have transformation files on your machine
#   - Configure sql_dir, jobs_dir, or notebooks_dir below
#
# OPTION 3: "auto" - Automatically choose based on what exists
#   - Uses local if files exist, otherwise databricks

lineage_source: "local"

# ============================================
# Databricks Workspace Paths (optional - for documentation)
# ============================================
# List where your ETL code lives in Databricks.
# This is OPTIONAL - just for documentation purposes.
# Unity Catalog tracks lineage automatically from ANY query that runs.

databricks_jobs:
  # Example (supports multiple entries):
  # - workspace_path: "/Repos/data-team/etl-pipelines"
  #   description: "Main ETL jobs"
  # - workspace_path: "/Repos/data-team/silver-layer"
  #   description: "Silver transformations"

# ============================================
# Local Files (when you have files on your machine)
# ============================================
# ALL PATHS ARE OPTIONAL - configure only what you have.
# Leave empty ("") if your jobs are only in Databricks.

# SQL files directory (CREATE TABLE ... AS SELECT statements)
sql_dir: "companies_data_duckdb/etl"

# Spark/PySpark jobs directory (Python files with ETL logic)
jobs_dir: ""

# Exported Databricks notebooks (if you exported them locally)
notebooks_dir: ""

# ============================================
# DuckDB Configuration (local database)
# ============================================
duckdb:
  path: "companies_data_duckdb/corporate.duckdb"

# ============================================
# Databricks Configuration
# ============================================
databricks:
  host: ""
  token: ""
  http_path: ""
  catalog: ""

# ============================================
# Email Configuration (optional)
# ============================================
# Fill in to enable emailing peer review reports.
# Leave smtp_user / smtp_password blank to disable email.
email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_user: ""          # e.g. you@gmail.com
  smtp_password: ""      # App password (not your login password)
  from_address: ""       # Usually the same as smtp_user
  use_tls: true

# ============================================
# Senior Peer Review Configuration
# ============================================
peer_review:
  enabled: true
  
  # LLM Configuration for business validation
  llm:
    provider: "gemini"  # or "openai", "claude"
    model: "gemini-1.5-flash"
    api_key_env: "GEMINI_API_KEY"  # Environment variable name
  
  # Risk thresholds
  risk_levels:
    block_commit_on: "RED"  # RED, YELLOW, or NEVER
    technical_severity_threshold: "MEDIUM"
    business_severity_threshold: "MEDIUM"
  
  # Performance settings
  cache_lineage: true
  max_downstream_depth: 10  # Limit downstream impact depth
  
  # Exclusions (files to skip)
  exclude_patterns:
    - "*/test/*"
    - "*/migrations/*"
    - "*.backup.sql"
